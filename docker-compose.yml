services:
  api:
    build:
      context: .
      target: api
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  ui:
    build:
      context: .
      target: ui
    command: streamlit run ui/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"
